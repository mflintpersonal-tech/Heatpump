{% extends "layout.html" %}

{% block content %}
<div class="row mb-4">
 <div class="d-grid gap-2">
  {% for s in songs %}
   {% if playing == s %}
    <button class="btn btn-primary" type="button">{{ s }}</button>
   {% else %}
    <button class="btn btn-info" type="button">{{ s }}</button>
   {% endif %}
  {% endfor %}
 </div>
</div>
<div class="row">
 <div class="d-grid">
    <button class="btn btn-danger" type="button">Stop Playing</button>
 </div>
</div>

{% endblock content %}
