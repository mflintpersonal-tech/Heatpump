{% extends "layout.html" %}

{% block content %}
      
      <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
      <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
      <div class='container-fluid px-4'>
        <div class='row'>
          <div class='col-10'>
            <div class='graphics' style='position: relative; height:80vh; width:72vw'>
              <canvas id='mycanvas'></canvas>
            </div>
          </div>
        </div>
      </div>
      <script>
        /*
         * These are the scripts to run after page has loaded
         */

        var myLineChart;

        //function initChart() {
          let ctx = document.querySelector('canvas').getContext('2d');

          myLineChart = new Chart(ctx, {
            options: { response: true,
                       maintainAspectRatio: false,
                       scales: {
                                 x: {
                                     title: {
                                             display: true,
                                             text: 'Outside Temperature'
                                            }
                                    },
                                 y: {
                                     min: 0,
                                     max: 60,
                                     title: {
                                             display: true,
                                             text: 'Leaving Water Temperature'
                                            }
                                    }
                               }
                     }, 
            type: 'line',
            title: {
                    display: true,
                    text: 'Weather Compensation Curve'
            },
            data: {
                   labels: [{{ exts|join(',') }}],
                   datasets: [{
                               label: 'Target LWT',
                               data: [{{ lwts|join(',') }}],
                               borderColor: 'blue',
                               fill: false,
                               spanGaps: true,
                               animations: true
                             }]
            }
          });
        //}
  
      </script>

{% endblock content %}
