{% extends "layout.html" %}

{% block content %}
      
      <!-- script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script -->
      <!-- script src="static/js/timepicker-bs4.js" defer="defer"></script -->
      <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
      <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
      <script defer src='static/js/monitor.js'></script>
      <div class='container-fluid px-4'>
        <div class='row'>
          <div class='col-10'>
            <div class='graphics' style='position: relative; height:80vh; width:72vw'>
              <canvas id='mycanvas'></canvas>
            </div>
            <div class='overlay' style='position:absolute; left:9%; top:30%;z-index:999'>
              <a href="#", onclick="paging('back');return false;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#f0f0f0" class="bi bi-arrow-left-circle-fill" viewBox="0 0 16 16">
                  <path style="stroke:white;stroke-width:1px;" d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm3.5 7.5a.5.5 0 0 1 0 1H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5z"/>
                </svg>
              </a>
            </div>
            <div class='overlay' style='position:absolute; right:24%; top:30%;z-index:999'>
              <a href="#", onclick="paging('forward');return false;">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#f0f0f0" class="bi bi-arrow-right-circle-fill" viewBox="0 0 16 16">
                  <path style="stroke:white;stroke-width:1px;" d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0zM4.5 7.5a.5.5 0 0 0 0 1h5.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H4.5z"/>
                </svg>
              </a>
            </div>
            <div id='performance' class='bg-info bg-opacity-10 border border-info rounded' style='display:none;position:absolute; right:24%; top:16%'>
              <table>
                <tbody>
                  <tr>
                    <td id='energy_out' class='border-bottom border-black' style='font-size:12px;'>0.0</td>
                    <td id='cop' class='fw-semibold' rowspan=2>N/A</td>
                  </tr>
                  <tr>
                    <td id='energy_in' style='font-size:12px;'>0.0</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          <div class='col-2'>
            <form action='/monitor' method='post'>
              <div class='row justify-content-center'>
                <div class='col text-center'>
                  Select Date Range
                </div>
              </div>
              <div class='row gx-4'>
                 <div class='col-6'>
                   <input name='range1' type='date' class='smalldate' value='{{ g.params['range1'] }}'>
                 </div>
                 <div class='col-6'>
                   <input name='range2' type='date' class='smalldate' value='{{ g.params['range2'] }}'>
                 </div>
              </div>
              <div class='row justify-content-center'>
                <div class='col' style='background-color: gainsboro'>
                  <div class='row'>
                    <div class='col text-center'>
                      <label class='form-check-label' for='time' >Apply time filter?</label>
                      <input class='form-check-input' id='time' type='checkbox' value='Y'>
                    </div>
                  </div>
                  <div class='row gx-4 text-center'>
                    <div class='col-6'>
                      <input class='mtime' type="time" id="time1" name="time1" autocomplete="off" value="00:00" />
                    </div>
                    <div class='col-6'>
                      <input class='mtime' type="time" id="time2" name="time2" autocomplete="off" value="12:00" />
                    </div>
                  </div>
                </div>
              </div>
              <div class='row'>
                <div class='col'>
                  <div class='d-grid gap-2 d-md-flex justify-content-center'>
                    <button class='btn btn-sm btn-outline-secondary m-1' onclick='fetchMonitor(event);return false;'>Show Data</button>
                  </div>
                </div>
              </div>
              <div class='row'>
                <div class='form-check' title='Values exclude 100W Frost Protection times'>
                  <label class='form-check-label' for='energy' >Show energy usage as well?</label>
                  <input class='form-check-input' id='energy' style='float:right;' type='checkbox' value='Y'>
                </div>
              </div>
              <div class='row'>
                <div class='form-check' title='Values such as LWT, RWT, ...'>
                  <label class='form-check-label' for='smooth' >Smooth some values?</label>
                  <input class='form-check-input' id='smooth' style='float:right;' type='checkbox' value='N'>
                  <!-- input class='form-check-input' id='smooth' style='float:right;' type='checkbox' checked value='Y' -->
                </div>
              </div>
              <div class='row'>
                <div class='col'>
                  <div id='input_parms' class='overflow-auto' style="min-height: 40vh; max-height: 54vh;">
                    <div>
                     {% set parms = g.params['parms'] %}
                     {% for k, v in g.parameters.items() %}
                      {% if (v['monitor'] == 'Y') or (v['type'] == 'extra') %}
                       <div class='form-check'>
                         <input class='form-check-input' id='{{ "cb" + k|replace(' ', '') }}' name='parms' title='{{ k }}' type='checkbox' value='{{ k }}' {{'checked' if k in parms else ''}}>
                         <label class='form-check-label' for='{{ "cb" + k|replace(' ','') }}' style='color:{{ v['colour'] }}'>{{ v['description'] }}</label>
                       </div>
                      {% endif %}
                     {% endfor %}
                    </div>
                  </div>
                </div>
              </div>
              <div class='row'>
                <div class='col'>
                  <strong>Collections</strong>
                  <br>
                  <div class='collections'>
                    <select class='form-select form-select-sm' onclick='updateParms(event);fetchMonitor("start");'>
                     {% for c in collections %}
                      <option name='collection' value='{{ ",".join(c['parameters']) }}'>{{ c['description'] }}</option>
                     {% endfor %}
                    </select>
                  </div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
      <script>
        /*
         * These are the scripts to run after page has loaded
         */
  
        $(document).ready(function () {
  
          initChart();
  
          /* show initial data */
          fetchMonitor('start');
  
          $('#input_parms input[type=checkbox]').on('change', function (e) {
            if ($('#input_parms input[type=checkbox]:checked').length > 8) {
              $(this).prop('checked', false);
              //alert("allowed only 8");
            }
          });
  
          //$('#time1').timepicker({
          //                        format:'HH:mm',
          //                        step: 300
          //                      });

        })
      </script>

{% endblock content %}
